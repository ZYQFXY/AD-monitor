{% extends "layout.html" %}
{% block title %}{{ "编辑品类" if cat else "新增品类" }}{% endblock %}
{% block content %}
<h2>{{ "编辑品类：" + cat.name if cat else "新增品类" }}</h2>
<form method="post" action="{{ '/categories/' + cat.id|string + '/edit' if cat else '/categories/new' }}" style="max-width:600px">
  <div class="form-row">
    <div>
      <label>品类名称 *</label>
      <input name="name" required value="{{ cat.name if cat else '' }}">
    </div>
    <div>
      <label>投手企微 userid *</label>
      <input name="pitcher_userid" required value="{{ cat.pitcher_userid if cat else '' }}">
    </div>
  </div>
  <div>
    <label>设计师企微 userid（用于低 CTR 素材告警）</label>
    <input name="designer_userid" value="{{ cat.designer_userid if cat else '' }}">
  </div>
  <hr style="margin:16px 0">
  <div class="form-row">
    <div>
      <label>最低盈利 ROAS 红线（低于此值+消耗达标→关停提醒）</label>
      <input name="min_roas" type="number" step="0.01" required value="{{ cat.min_roas if cat else 1.2 }}">
    </div>
    <div>
      <label>高 ROAS 增量线（高于此值→加预算提醒）</label>
      <input name="scale_roas" type="number" step="0.01" required value="{{ cat.scale_roas if cat else 2.5 }}">
    </div>
  </div>
  <div>
    <label>触发 ROAS 预警最低消耗（元，避免小额误报）</label>
    <input name="min_spend_trigger" type="number" step="0.01" required value="{{ cat.min_spend_trigger if cat else 500 }}">
  </div>
  <hr style="margin:16px 0">
  <div class="form-row">
    <div>
      <label>CTR 红线（低于此值通知换素材，如 0.012 = 1.2%）</label>
      <input name="ctr_threshold" type="number" step="0.001" required value="{{ cat.ctr_threshold if cat else 0.012 }}">
    </div>
    <div>
      <label>CTR 统计周期（天）</label>
      <input name="ctr_window_days" type="number" required value="{{ cat.ctr_window_days if cat else 7 }}">
    </div>
  </div>
  <div>
    <label>CTR 最低展示量（展示量不足不触发预警）</label>
    <input name="ctr_min_impressions" type="number" required value="{{ cat.ctr_min_impressions if cat else 10000 }}">
  </div>
  <div style="margin-top:8px">
    <button class="btn btn-primary">保存</button>
    <a href="/" class="btn btn-secondary" style="margin-left:8px">取消</a>
  </div>
</form>
{% endblock %}
