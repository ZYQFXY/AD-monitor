{% extends "layout.html" %}
{% block title %}系统设置{% endblock %}
{% block content %}
<h2>系统设置</h2>
{% if msg == "saved" %}<div class="msg msg-ok">设置已保存</div>{% endif %}

<form method="post" action="/settings" style="max-width:500px">
  <label>企微群 Webhook URL</label>
  <input name="webhook_url" value="{{ webhook_url }}" placeholder="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=..." required>
  <p style="color:#777;font-size:12px;margin-top:-8px">所有预警统一推送到此群，通过 @userid 指定接收人。</p>
  <button class="btn btn-primary">保存</button>
</form>
{% endblock %}
